<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Page</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  overflow: hidden;
}

/* SLIDER */
.slider {
  position: fixed;
  width: 100%;
  height: 100%;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: transform 1s ease-in-out;
}

/* CENTER */
.center-box {
  position: absolute;
  top: 22%; /* 🔥 LEBIH KE ATAS */
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

/* PROFILE */
.profile {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 6px solid white;
  object-fit: cover;
  box-shadow: 0 0 30px rgba(255,0,0,0.8);
  position: relative;
}

/* 🟢 ONLINE DOT */
.profile-wrapper {
  position: relative;
  display: inline-block;
}

.online-dot {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 26px;
  height: 26px;
  background: #00ff00;
  border-radius: 50%;
  border: 4px solid white;
  box-shadow: 0 0 10px #00ff00;
  animation: pulseOnline 1.5s infinite;
}

@keyframes pulseOnline {
  0% {
    box-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
    transform: scale(1.2);
  }
  100% {
    box-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
    transform: scale(1);
  }
}

/* TEXT */
.join-text {
  margin-top: 15px;
  font-size: 26px;
}

/* BUTTONS */
.buttons {
  position: absolute;
  bottom: 120px;
  width: 100%;
  padding: 0 20px;
}

.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e9e9e9;
  padding: 16px 20px;
  margin: 14px 0;
  border-radius: 40px;
  text-decoration: none;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(255,0,0,0.6);
}

.btn span {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn img {
  width: 28px;
}

/* 🔥 ANIMATION WA (UP DOWN) */
.btn-wa {
  animation: moveUpDown 2s infinite ease-in-out;
}

@keyframes moveUpDown {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* 🔥 ANIMATION TELEGRAM (LEFT RIGHT) */
.btn-tg {
  animation: moveLeftRight 2s infinite ease-in-out;
}

@keyframes moveLeftRight {
  0% { transform: translateX(0); }
  50% { transform: translateX(10px); }
  100% { transform: translateX(0); }
}

/* 🔥 GLOW TEXT */
.bottom {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 14px;
  letter-spacing: 2px;
  text-shadow:
    0 0 5px #ff0000,
    0 0 10px #ff0000,
    0 0 20px #ff0000,
    0 0 40px #ff0000;
}
</style>
</head>

<body>

<div class="slider">
  <div class="slide" id="slide1"></div>
  <div class="slide" id="slide2"></div>
</div>

<div class="center-box">
  <div class="profile-wrapper">
    <img id="profile" class="profile">
    <div class="online-dot"></div>
  </div>
  <div class="join-text" id="joinText"></div>
</div>
</div>

<div class="buttons" id="buttons"></div>

<div class="bottom" id="bottomText"></div>

<script src="config.js"></script>

<script>
const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");

slide1.style.backgroundImage = `url(${CONFIG.backgrounds[0]})`;
slide2.style.backgroundImage = `url(${CONFIG.backgrounds[1]})`;

slide2.style.transform = "translateX(100%)";

let current = 0;

function slideMove() {
  if (current === 0) {
    slide1.style.transform = "translateX(-100%)";
    slide2.style.transform = "translateX(0)";
    current = 1;
  } else {
    slide1.style.transform = "translateX(0)";
    slide2.style.transform = "translateX(100%)";
    current = 0;
  }
}

setInterval(slideMove, 4000);

// PROFILE
document.getElementById("profile").src = CONFIG.profile;

// TEXT
document.getElementById("joinText").innerText = CONFIG.joinText;
document.getElementById("bottomText").innerText = CONFIG.bottomText;

// BUTTON
const container = document.getElementById("buttons");

CONFIG.links.forEach(link => {
  const a = document.createElement("a");
  a.href = link.url;
  a.className = "btn";

  // 🔥 DETECT BUTTON TYPE
  if (link.name.toLowerCase().includes("whatsapp")) {
    a.classList.add("btn-wa");
  }

  if (link.name.toLowerCase().includes("telegram")) {
    a.classList.add("btn-tg");
  }

  a.target = "_blank";

  a.innerHTML = `
    <span>
      <img src="${link.icon}">
      ${link.name}
    </span>
    <span>•••</span>
  `;

  container.appendChild(a);
});
</script>

</body>
</html>
